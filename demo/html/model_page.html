{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <h2>{{ model_title }}</h2>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Artist</th>
          <th>Track</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td>{{ row.artist_name }}</td>
          <td>{{ row.track_name }}</td>
          <td>
            <form method="post" action="{{ url_for('commit_song') }}">
              <input type="hidden" name="artist_name" value="{{ row.artist_name }}">
              <input type="hidden" name="track_name" value="{{ row.track_name }}">
              <input type="hidden" name="redirect_to" value="{{ redirect_to }}">
              <button type="submit">Listen</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
